<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Trains | RailGo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="logo-box">R</div>
            RailGo
        </a>
        <div id="nav-dynamic" class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="search.html" class="nav-link active">Search</a>
        </div>
        <div class="nav-links" style="margin-left: auto;">
            <a href="login.html" class="nav-link">Login</a>
        </div>
    </nav>

    <div class="container" style="flex: 1;">
        <div class="page-wrapper">
            <div class="alert alert-warning mb-3 hidden" id="demo-alert" style="background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; padding: 12px; border-radius: 6px;">
                <strong>Note:</strong> The real-time price comparison feature is currently a <strong>demo/simulation</strong>.
            </div>

            <div class="card mb-3" style="padding: 1.5rem 2rem;">
                <h2 style="margin-bottom: 1rem; color: var(--navy); font-size: 1.5rem;">Where to today?</h2>
                <form id="search-form" class="grid-3" style="align-items: flex-end;">
                    <div class="form-group mb-0">
                        <label class="form-label">Source</label>
                        <input type="text" id="source" class="form-control" placeholder="e.g. Delhi" required>
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Destination</label>
                        <input type="text" id="destination" class="form-control" placeholder="e.g. Mumbai" required>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary btn-block">Search trains</button>
                    </div>
                </form>
            </div>

            <div id="alert-box" class="alert"></div>

            <div id="results-container">
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <h3>Start your search</h3>
                    <p>Enter source and destination to view available trains.</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div>&copy; 2026 RailGo. All rights reserved.</div>
        <div style="display:flex; gap:1rem;">
            <a href="#" style="color:rgba(255,255,255,0.7)">Terms</a>
            <a href="#" style="color:rgba(255,255,255,0.7)">Privacy</a>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/search.js"></script>
    <script>
        const user = getUser();
        const nav = document.getElementById('nav-dynamic');
        if (user) {
            nav.innerHTML = `
                <a href="index.html" class="nav-link">Home</a>
                <a href="search.html" class="nav-link active">Search</a>
                <a href="myBookings.html" class="nav-link">My Bookings</a>
                ${user.role === 'ADMIN' ? '<a href="adminDashboard.html" class="nav-link">Admin</a>' : ''}
            `;
            document.querySelector('.nav-links[style="margin-left: auto;"]').innerHTML = `
                <button class="nav-btn" title="Profile">${user.name.charAt(0).toUpperCase()}</button>
                <button onclick="clearSession(); window.location.reload();" class="nav-link" style="background:none;border:none;cursor:pointer;">Logout</button>
            `;
        }
    </script>
</body>
</html>
