<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RailWayPro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 5rem auto;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">RailWay<span>Pro</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="register.html" class="nav-link">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <div class="card">
                <div class="page-header">
                    <h1>Welcome Back</h1>
                    <p>Enter your credentials to access your account.</p>
                </div>

                <div id="alert-box" class="alert"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="admin@railwaypro.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg mt-1">Login to Account</button>
                </form>

                <p class="text-center mt-3 text-secondary">
                    New to RailWayPro? <a href="register.html">Create an account</a>
                </p>
                
                <div class="mt-3 p-2 text-center" style="background: var(--bg-card2); border-radius: 8px; font-size: 0.8rem; border: 1px dashed var(--border);">
                   <strong>Demo Admin:</strong> admin@railwaypro.com / admin123
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
